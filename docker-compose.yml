version: '3.8'

services:
  # 1. Frontend Service (React / Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: recoplant-frontend
    ports:
      - "5173:5173" # Port default Vite
    environment:
      - TZ=America/Los_Angeles
    volumes:
      - ./frontend:/app
      - /app/node_modules # Mencegah overwrite node_modules lokal ke dalam container
    command: npm run dev -- --host 0.0.0.0
    networks:
      - recoplant-network

  # 2. Backend Service (Laravel 11)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: recoplant-backend
    ports:
      - "8080:8080"
    environment:
      - TZ=America/Los_Angeles
      # Memanggil ML service menggunakan nama container-nya (DNS internal Docker)
      - ML_API_URL=http://ml-service:8081 
      # Konfigurasi Database diarahkan ke container LXC eksternal
      - DB_CONNECTION=mysql
      - DB_HOST=${LXC_DB_HOST:-192.168.1.100} # Ganti dengan IP LXC kamu di file .env
      - DB_PORT=3306
      - DB_DATABASE=db_recoplant
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - ml-service
    command: php artisan serve --host=0.0.0.0 --port=8080
    networks:
      - recoplant-network

  # 3. Machine Learning Service (Python FastAPI)
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: recoplant-ml
    ports:
      - "127.0.0.1:8081:8081" # Hanya dapat diakses dari host local, aman dari luar
    environment:
      - TZ=America/Los_Angeles
    volumes:
      - ./ml-service:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8081 --reload
    networks:
      - recoplant-network

# Mendefinisikan network internal agar ketiga service bisa saling memanggil nama
networks:
  recoplant-network:
    driver: bridge