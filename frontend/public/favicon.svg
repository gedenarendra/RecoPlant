<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background: Rounded container matching the Navbar logo -->
  <rect x="24" y="24" width="464" height="464" rx="120" fill="#041F14" stroke="rgba(255, 255, 255, 0.1)" stroke-width="12" />
  
  <!-- Subtle inner shadow/gradient overlay for premium design depth -->
  <rect x="30" y="30" width="452" height="452" rx="114" fill="url(#bg-gradient)" stroke="rgba(46, 204, 113, 0.2)" stroke-width="8" />

  <!-- The Leaf Icon matching lucide-react Leaf -->
  <g transform="translate(112, 112) scale(12)" stroke="#2ECC71" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.4 19 2c1 2 2 4.1 2 8 0 6.6-6 10-10 10Z" />
    <path d="M2 21c0-3 1.85-5.36 5.05-6C6 13 6 11 8 11" />
  </g>

  <defs>
    <!-- Premium radial gradient for the background to give it glowing depth -->
    <radialGradient id="bg-gradient" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#0A2E20" />
      <stop offset="100%" stop-color="#041F14" />
    </radialGradient>
  </defs>
</svg>